<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Rs de la Economia Circular — Coffee Pie</title>
    <style>
        :root {
            --cp-dark: #181818;
            --cp-border: #333;
            --cp-text: #fff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff;
            padding: 32px 16px;
        }

        .r-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .r-row {
            display: flex;
            align-items: stretch;
            gap: 12px;
            height: 52px;
        }

        .r-left {
            flex: 0 0 220px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-left: 16px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            clip-path: polygon(0 0, 91% 0, 100% 50%, 91% 100%, 0 100%);
            background-color: var(--row-color);
        }

        .r-left .r-id {
            font-size: 1.6rem;
            font-weight: 800;
            min-width: 36px;
        }

        .r-right {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 32px 0 16px;
            color: #fff;
            font-size: 0.9rem;
            line-height: 1.3;
            clip-path: polygon(0 0, 96% 0, 100% 50%, 96% 100%, 0 100%);
            background-color: var(--row-color);
        }

        .r-legend { display: none; }

        @media (max-width: 768px) {
            body { padding: 10px 8px; }

            .r-container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                max-width: none;
            }

            .r-row {
                display: flex;
                flex-direction: column;
                height: auto;
                gap: 0;
                clip-path: polygon(0 0, 92% 0, 100% 50%, 92% 100%, 0 100%);
                background-color: var(--row-color);
                color: #fff;
                padding: 10px 22px 10px 12px;
            }

            .r-left {
                flex: none;
                width: auto;
                height: auto;
                clip-path: none;
                background: transparent;
                padding: 0;
                font-size: 0.85rem;
                font-weight: 700;
                margin-bottom: 3px;
                display: block;
            }

            .r-left .r-id {
                font-size: 1.3rem;
                font-weight: 800;
                min-width: auto;
                margin-right: 4px;
            }

            .r-right {
                display: block;
                flex: none;
                clip-path: none;
                background: transparent;
                padding: 0;
                font-size: 0.68rem;
                line-height: 1.25;
                opacity: 0.92;
            }
        }

        @media (max-width: 480px) {
            .r-container {
                grid-template-columns: 1fr;
                gap: 6px;
            }

            .r-row {
                padding: 10px 24px 10px 14px;
            }

            .r-left { font-size: 0.9rem; }
            .r-left .r-id { font-size: 1.4rem; }
            .r-right { font-size: 0.72rem; }
        }
    </style>
</head>
<body>

    <div class="r-container" id="r-container"></div>
    <script src="/js/lang.js"></script>
    <script>
        (function() {
            var data = [
                { id: "R0", name: "Rechazar",   desc: "Rechazar productos innecesarios o reemplazarlos por uno diferente",                     color: "#168B42" },
                { id: "R1", name: "Repensar",   desc: "Repensar como podemos hacer un uso mas intensivo de los productos",                    color: "#1C9C50" },
                { id: "R2", name: "Reducir",    desc: "Reducir los materiales o el consumo de estos, para reducir su huella",                  color: "#7DC242" },
                { id: "R3", name: "Reusar",     desc: "Reusar un producto descartado pero que aun pueda realizar su funcion original",          color: "#D2DF31" },
                { id: "R4", name: "Reparar",    desc: "Reparar y mantener un producto para que siga siendo usado en su funcion original",      color: "#DFE52B" },
                { id: "R5", name: "Restaurar",  desc: "Restaurar un producto viejo, actualizarlo y mantenerlo en uso",                        color: "#F0891A" },
                { id: "R6", name: "Remanufacturar", desc: "Remanufacturar partes de un producto desechado en uno nuevo con la misma funcion",color: "#EE7813" },
                { id: "R7", name: "Reutilizar", desc: "Reconvertir partes de un producto desechado en uno nuevo con funcion diferente",        color: "#E86915" },
                { id: "R8", name: "Reciclar",   desc: "Reciclar: procesar materiales usados para obtener materia prima de la misma calidad",   color: "#D11F2E" },
                { id: "R9", name: "Recuperar",  desc: "Recuperar materiales para usarlos en procesos de generacion de energia",                color: "#A81615" }
            ];

            var container = document.getElementById('r-container');
            var langReady = false;

            function buildDOM() {
                container.innerHTML = '';
                data.forEach(function(item) {
                    var row = document.createElement('div');
                    row.className = 'r-row';
                    row.style.setProperty('--row-color', item.color);

                    var left = document.createElement('div');
                    left.className = 'r-left';
                    left.innerHTML = '<span class="r-id">' + item.id + '</span>' + item.name;

                    var right = document.createElement('div');
                    right.className = 'r-right';
                    right.textContent = item.desc;

                    row.appendChild(left);
                    row.appendChild(right);
                    container.appendChild(row);
                });
            }

            function applyTranslation(lang) {
                if (!langReady || !window.CoffeePieLang) return;
                buildDOM();
                window.CoffeePieLang.set(lang || window.CoffeePieLang.get());
            }

            buildDOM();

            // Wait for lang.js dictionary to load
            var attempts = 0;
            var retry = setInterval(function() {
                if (window.CoffeePieLang && typeof window.CoffeePieLang.set === 'function') {
                    langReady = true;
                    window.CoffeePieLang.set(window.CoffeePieLang.get());
                    clearInterval(retry);
                }
                if (++attempts > 20) clearInterval(retry);
            }, 250);

            // Listen for language change from parent page
            window.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'cp-lang-change') {
                    applyTranslation(e.data.lang);
                }
            });

            // Notify parent when content height changes (viewport resize, foldable transitions, etc.)
            if (window.ResizeObserver) {
                var ro = new ResizeObserver(function() {
                    var h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
                    parent.postMessage({ type: 'cp-iframe-resize', height: h }, '*');
                });
                ro.observe(document.body);
            }
        })();
    </script>
</body>
</html>
