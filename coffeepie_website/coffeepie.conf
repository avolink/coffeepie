server {
    listen 80;
    server_name coffeepie.co www.coffeepie.co;
    root /var/www/COFFEE_PIE/public;
    index index.html;

    # Support for Firebase 'cleanUrls': true
    # This automatically tries to append .html if the file is not found
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Explicit Rewrites from firebase.json
    location /precios { rewrite ^/precios$ /precios.html break; }
    location /tienda { rewrite ^/tienda$ /tienda.html break; }
    location /tutoriales { rewrite ^/tutoriales$ /tutoriales.html break; }
    location /acerca-de { rewrite ^/acerca-de$ /acerca-de.html break; }
    location /api { rewrite ^/api$ /api.html break; }
    location /politica-de-envios { rewrite ^/politica-de-envios$ /politica-de-envios.html break; }
    location /politica-de-privacidad { rewrite ^/politica-de-privacidad$ /politica-de-privacidad.html break; }
    location /politica-de-retornos { rewrite ^/politica-de-retornos$ /politica-de-retornos.html break; }
    location /terminos-y-condiciones { rewrite ^/terminos-y-condiciones$ /terminos-y-condiciones.html break; }
    location /portal-de-inversionistas { return 301 /portal-inversionistas; }
    location /portal-inversionistas { rewrite ^/portal-inversionistas$ /portal-inversionistas.html break; }
    location /accesibilidad { rewrite ^/accesibilidad$ /accesibilidad.html break; }
    location /dispositivos-certificados { rewrite ^/dispositivos-certificados$ /dispositivos-certificados.html break; }
    location /fabricantes { rewrite ^/fabricantes$ /fabricantes.html break; }
    location /proveedores-nube { rewrite ^/proveedores-nube$ /proveedores-nube.html break; }

    # Custom 404 Handling
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Performance: Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache Control for PWA Assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|zip)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
