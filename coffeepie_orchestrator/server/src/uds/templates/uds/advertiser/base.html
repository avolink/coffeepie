<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Pie Ads - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, Helvetica, sans-serif; background: #111; color: #fff; min-height: 100vh; }
        nav { background: #1a1a1a; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #c18b44; }
        nav h1 { font-size: 1.4rem; color: #c18b44; }
        nav a { color: #ccc; text-decoration: none; margin-left: 25px; font-size: 0.95rem; }
        nav a:hover, nav a.active { color: #fff; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 25px; text-align: center; }
        .stat-card .value { font-size: 2rem; color: #c18b44; font-weight: bold; }
        .stat-card .label { font-size: 0.9rem; color: #888; margin-top: 8px; }
        table { width: 100%; border-collapse: collapse; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
        th { background: #222; padding: 14px 16px; text-align: left; font-weight: 500; color: #c18b44; font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 12px 16px; border-bottom: 1px solid #2a2a2a; font-size: 0.9rem; }
        tr:hover td { background: #252525; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .badge-active { background: #c18b44; color: #111; }
        .badge-paused { background: #444; color: #888; }
        .btn { display: inline-block; padding: 10px 24px; background: #c18b44; color: #111; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 0.9rem; cursor: pointer; border: none; }
        .btn:hover { background: #d49b56; }
        .btn-small { padding: 6px 14px; font-size: 0.8rem; }
        .empty { text-align: center; padding: 60px; color: #666; font-size: 1.1rem; }
    </style>
</head>
<body>
    <nav>
        <h1>Coffee Pie Ads</h1>
        <div>
            <a href="/uds/page/advertiser/" class="{% if request.path == '/uds/page/advertiser/' %}active{% endif %}">Dashboard</a>
            <a href="/uds/page/advertiser/campaigns" class="{% if '/campaigns' in request.path %}active{% endif %}">Campañas</a>
            <a href="/uds/page/advertiser/keys" class="{% if '/keys' in request.path %}active{% endif %}">API Keys</a>
            <a href="/uds/page/advertiser/analytics" class="{% if '/analytics' in request.path %}active{% endif %}">Analíticas</a>
            <a href="/uds/page/logout">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
